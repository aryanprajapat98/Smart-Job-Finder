{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Smart Job Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="auth-page">
  <div class="auth-wrapper">

    <div class="auth-logo">
      <div class="logo-icon">💼</div>
      <div class="logo-text">
        <h1>Smart <span>Job Finder</span></h1>
        <p>Find Better. Apply Smarter.</p>
      </div>
    </div>

    <div class="login-card">

      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger" style="color:red;margin-bottom:16px;">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form class="auth-form active" method="POST" action="{% url 'reset_password' token %}">
        {% csrf_token %}
        <h3>Set a New Password 🔒</h3>
        <p class="sub">Choose a strong password for your account</p>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" name="new_password" placeholder="New Password" required>
          <span class="toggle-eye">🙈</span>
        </div>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
          <span class="toggle-eye">🙈</span>
        </div>

        <button type="submit" class="login-submit" style="margin-top:6px;">Reset Password</button>

        <p class="signup-text"><a href="{% url 'login' %}">Back to Login</a></p>
      </form>

    </div>
  </div>
</div>

<script src="{% static 'script.js' %}"></script>
</body>
</html>
